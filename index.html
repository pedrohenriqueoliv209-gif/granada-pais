<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa - Granada (correto)</title>

<style>
body {
    margin: 0;
    background: #0a1a2a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.mapa {
    position: relative;
    width: 1000px;
}

.mapa img {
    width: 100%;
    display: block;
}

.ponto {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
    transform: translate(-50%, -50%);
}

.label {
    position: absolute;
    color: white;
    font-family: Arial;
    font-size: 14px;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="mapa">
    <img id="mapaImg" src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">

    <div id="ponto" class="ponto"></div>
    <div id="label" class="label"><a href="k.html">ir a </a>Granada</div>
</div>

<script>
// Coordenadas de Granada
const lat = 11.98;
const lon = -61.68;

// Converter para posição no mapa (projeção simples equiretangular)
const x = (lon + 180) * (100 / 360);
const y = (90 - lat) * (100 / 180);

// Aplicar posição
const ponto = document.getElementById("ponto");
const label = document.getElementById("label");

ponto.style.left = x + "%";
ponto.style.top = y + "%";

label.style.left = x + "%";
label.style.top = (y + 3) + "%";
</script>

</body>
</html>
